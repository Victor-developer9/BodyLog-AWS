<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>BodyLog AWS</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

    <h1>BodyLog AWS</h1>

    <div>
        <label>日付</label>
        <input type="date" id="date">
    </div>

    <div>
        <label>体重（朝イチ）</label>
        <input type="number" id="weight">
    </div>

    <div>
        <label>歩数（就寝前）</label>
        <input type="number" id="steps">
    </div>

    <div>
        <label>睡眠時間（hh:mm）</label>
        <input type="time" id="sleep">
    </div>

    <hr>

    <h2>朝食</h2>

    <input type="text" id="breakfast1"><br>
    <input type="text" id="breakfast2"><br>
    <input type="text" id="breakfast3"><br>
    <input type="text" id="breakfast4"><br>
    <input type="text" id="breakfast5"><br>
    <input type="text" id="breakfast6"><br>
    
    <hr>

    <h2>昼食</h2>

    <input type="text" id="lunch1"><br>
    <input type="text" id="lunch2"><br>
    <input type="text" id="lunch3"><br>
    <input type="text" id="lunch4"><br>
    <input type="text" id="lunch5"><br>
    <input type="text" id="lunch6"><br>
    
    <hr>

    <h2>夕食</h2>

    <input type="text" id="dinner1"><br>
    <input type="text" id="dinner2"><br>
    <input type="text" id="dinner3"><br>
    <input type="text" id="dinner4"><br>
    <input type="text" id="dinner5"><br>
    <input type="text" id="dinner6"><br>

    <hr>

    <h2>間食</h2>

    <input type="text" id="snack1"><br>
    <input type="text" id="snack2"><br>
    <input type="text" id="snack3"><br>
    <input type="text" id="snack4"><br>
    <input type="text" id="snack5"><br>
    <input type="text" id="snack6"><br>

    <hr>

    <h2>メモ</h2>

    <textarea id="memo" rows="5" cols="40"></textarea>

    <br><br>

    <button id="saveButton">保存</button>

    <hr>

    <h2>保存済みデータ</h2>

    <div id="bodylogList"></div>

    <script src="script.js"></script>

    </div>

</body>
</html>
